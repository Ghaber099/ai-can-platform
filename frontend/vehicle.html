<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vehicle Profile</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>

<body>
  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Vehicle Profile Center</h2>
        <p>Create or search vehicle using VIN, plate, make, model, or year.</p>
      </div>

      <button class="ghost-btn" onclick="window.close()">Close</button>
    </header>

    <section class="dashboard-grid">

      <div class="panel">
        <div class="panel-header">
          <h3>Find Vehicle</h3>
          <span>Search Vehicle</span>
        </div>

        <input id="searchVin" type="text" placeholder="Search VIN, plate, make, model, or year" />

        <button class="primary-btn full" onclick="findVehicle()">
          Open Vehicle Profile
        </button>

        <button class="secondary-btn full" onclick="openAllVehicles()">
          All Vehicles
        </button>

        <div id="vehicleSearchResult" class="result-list">
          No vehicle searched yet.
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h3>New Vehicle</h3>
          <span>Vehicle Information</span>
        </div>

        <div class="form-grid">
          <input id="ownerLicense" type="text" placeholder="Customer Driving License Number" />
          <input id="vin" type="text" placeholder="VIN Number" />
          <input id="plate" type="text" placeholder="Plate Number" />
          <input id="make" type="text" placeholder="Make" />
          <input id="model" type="text" placeholder="Model" />
          <input id="year" type="text" placeholder="Year" />
          <input id="color" type="text" placeholder="Color" />
          <input id="ecu" type="text" placeholder="ECU Number" />
          <input id="engine" type="text" placeholder="Engine Number" />
        </div>

        <textarea id="vehicleNotes" placeholder="Notes"></textarea>

        <button class="primary-btn full" onclick="saveVehicle()">
          Save Vehicle
        </button>

        <p id="vehicleStatus">No vehicle saved yet.</p>
      </div>

    </section>
  </main>

  <script src="js/vehicle.js"></script>
</body>
</html>
